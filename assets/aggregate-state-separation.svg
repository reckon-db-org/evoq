<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4b5563"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <linearGradient id="headerGradLeft" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="headerGradRight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="400" y="30" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#1f2937">Aggregate / State Separation</text>
  <text x="400" y="50" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#6b7280">evoq_aggregate delegates data shape and event folding to evoq_state</text>

  <!-- Left box: evoq_aggregate -->
  <rect x="40" y="75" width="300" height="240" rx="8" fill="#f8fafc" stroke="#3b82f6" stroke-width="2"/>
  <rect x="40" y="75" width="300" height="32" rx="8" fill="url(#headerGradLeft)"/>
  <!-- Cover bottom corners of header -->
  <rect x="40" y="95" width="300" height="12" fill="url(#headerGradLeft)"/>
  <text x="190" y="97" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">evoq_aggregate</text>

  <!-- Aggregate callbacks -->
  <text x="60" y="132" font-family="system-ui, monospace" font-size="13" fill="#1e40af">state_module/0</text>
  <text x="60" y="160" font-family="system-ui, monospace" font-size="13" fill="#1e40af">init/1</text>
  <text x="60" y="188" font-family="system-ui, monospace" font-size="13" fill="#1e40af">execute/2</text>
  <text x="60" y="216" font-family="system-ui, monospace" font-size="13" fill="#1e40af">apply/2</text>

  <!-- Optional callbacks -->
  <line x1="60" y1="232" x2="310" y2="232" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="252" font-family="system-ui, sans-serif" font-size="11" fill="#9ca3af" font-style="italic">optional:</text>
  <text x="60" y="272" font-family="system-ui, monospace" font-size="12" fill="#9ca3af">snapshot/1</text>
  <text x="60" y="292" font-family="system-ui, monospace" font-size="12" fill="#9ca3af">from_snapshot/1</text>

  <!-- Right box: evoq_state -->
  <rect x="460" y="75" width="300" height="240" rx="8" fill="#f0fdf4" stroke="#10b981" stroke-width="2"/>
  <rect x="460" y="75" width="300" height="32" rx="8" fill="url(#headerGradRight)"/>
  <!-- Cover bottom corners of header -->
  <rect x="460" y="95" width="300" height="12" fill="url(#headerGradRight)"/>
  <text x="610" y="97" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">evoq_state</text>

  <!-- State callbacks -->
  <text x="480" y="132" font-family="system-ui, monospace" font-size="13" fill="#166534">new/1</text>
  <text x="480" y="160" font-family="system-ui, monospace" font-size="13" fill="#166534">apply_event/2</text>
  <text x="480" y="188" font-family="system-ui, monospace" font-size="13" fill="#166534">to_map/1</text>

  <!-- Optional callbacks -->
  <line x1="480" y1="204" x2="730" y2="204" stroke="#e5e7eb" stroke-width="1"/>
  <text x="480" y="224" font-family="system-ui, sans-serif" font-size="11" fill="#9ca3af" font-style="italic">optional:</text>
  <text x="480" y="244" font-family="system-ui, monospace" font-size="12" fill="#9ca3af">from_map/1</text>

  <!-- Arrow: state_module/0 -> evoq_state header -->
  <line x1="270" y1="127" x2="458" y2="91" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="370" y="100" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#3b82f6" font-weight="bold">returns module</text>

  <!-- Arrow: init/1 delegates to new/1 -->
  <path d="M 270 155 C 350 155, 390 127, 470 127" fill="none" stroke="#4b5563" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="380" y="132" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#6b7280">delegates</text>

  <!-- Arrow: apply/2 delegates to apply_event/2 -->
  <path d="M 270 211 C 350 211, 390 155, 470 155" fill="none" stroke="#4b5563" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="380" y="182" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle" fill="#6b7280">delegates</text>

  <!-- Bottom note -->
  <rect x="60" y="340" width="680" height="40" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="400" y="365" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#1e40af">The state module is the "default read model" -- it owns the data shape, event folding, and serialization</text>
</svg>
